name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "prefix=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.prefix }}-backend:latest
            ${{ steps.images.outputs.prefix }}-backend:${{ steps.images.outputs.sha_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api' }}
          tags: |
            ${{ steps.images.outputs.prefix }}-frontend:latest
            ${{ steps.images.outputs.prefix }}-frontend:${{ steps.images.outputs.sha_tag }}

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          if [ -z "$VPS_HOST" ]; then
            echo "::error::VPS_HOST secret is missing. Use only the server IP/hostname, without ssh:// and without user@."
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::VPS_USER secret is missing."
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is missing. Paste the full private key, including BEGIN and END lines."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          SSH_CONFIG
          chmod 600 ~/.ssh/config

          ssh-keyscan -T 20 -H "$VPS_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning::Could not pre-scan VPS host key; SSH will still try to accept it on first connection."
          ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" "echo SSH connection ready"

      - name: Copy production compose file
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${{ secrets.VPS_APP_DIR }}'"
          scp docker-compose.prod.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/docker-compose.yml"

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'REMOTE'
          set -eu
          cd "${{ secrets.VPS_APP_DIR }}"

          cat > .env << 'ENV'
          GHCR_IMAGE_PREFIX=${{ steps.images.outputs.prefix }}
          IMAGE_TAG=latest
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}
          FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          SEED_DEMO_DATA=${{ secrets.SEED_DEMO_DATA }}
          ENV

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose pull
          docker compose up -d
          docker image prune -f
          REMOTE
