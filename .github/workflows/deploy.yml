name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "prefix=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.prefix }}-backend:latest
            ${{ steps.images.outputs.prefix }}-backend:${{ steps.images.outputs.sha_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api' }}
          tags: |
            ${{ steps.images.outputs.prefix }}-frontend:latest
            ${{ steps.images.outputs.prefix }}-frontend:${{ steps.images.outputs.sha_tag }}

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          one_line() {
            printf '%s' "$1" | tr -d '\r\n'
          }
          VPS_HOST="$(one_line "$VPS_HOST")"
          VPS_USER="$(one_line "$VPS_USER")"

          if [ -z "$VPS_HOST" ]; then
            echo "::error::VPS_HOST secret is missing. Use only the server IP/hostname, without ssh:// and without user@."
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::VPS_USER secret is missing."
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is missing. Paste the full private key, including BEGIN and END lines."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          SSH_CONFIG
          chmod 600 ~/.ssh/config

          ssh-keyscan -T 20 -H "$VPS_HOST" >> ~/.ssh/known_hosts || \
            echo "::warning::Could not pre-scan VPS host key; SSH will still try to accept it on first connection."
          ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" "echo SSH connection ready"

      - name: Copy production compose file
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -eu
          one_line() {
            printf '%s' "$1" | tr -d '\r\n'
          }
          VPS_HOST="$(one_line "$VPS_HOST")"
          VPS_USER="$(one_line "$VPS_USER")"
          VPS_APP_DIR="$(one_line "$VPS_APP_DIR")"

          if [ -z "$VPS_APP_DIR" ]; then
            echo "::error::VPS_APP_DIR secret is missing."
            exit 1
          fi

          remote_dir="$(printf '%q' "$VPS_APP_DIR")"
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p $remote_dir"
          scp docker-compose.prod.yml "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/docker-compose.yml"

      - name: Deploy on VPS
        shell: bash
        env:
          GHCR_IMAGE_PREFIX: ${{ steps.images.outputs.prefix }}
          IMAGE_TAG: latest
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          SEED_DEMO_DATA: ${{ secrets.SEED_DEMO_DATA }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -eu
          one_line() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          VPS_HOST="$(one_line "$VPS_HOST")"
          VPS_USER="$(one_line "$VPS_USER")"
          VPS_APP_DIR="$(one_line "$VPS_APP_DIR")"
          DJANGO_ALLOWED_HOSTS="$(one_line "$DJANGO_ALLOWED_HOSTS")"
          FRONTEND_ORIGIN="$(one_line "$FRONTEND_ORIGIN")"
          BACKEND_PORT="$(one_line "$BACKEND_PORT")"
          FRONTEND_PORT="$(one_line "$FRONTEND_PORT")"
          SEED_DEMO_DATA="$(one_line "$SEED_DEMO_DATA")"

          env_value() {
            # Compose .env files parse single-quoted values literally, so this
            # keeps symbols in secrets from being treated as interpolation.
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/\\\\'/g")"
          }

          env_file="$(mktemp)"
          trap 'rm -f "$env_file"' EXIT
          {
            printf 'GHCR_IMAGE_PREFIX=%s\n' "$(env_value "$GHCR_IMAGE_PREFIX")"
            printf 'IMAGE_TAG=%s\n' "$(env_value "$IMAGE_TAG")"
            printf 'DJANGO_SECRET_KEY=%s\n' "$(env_value "$DJANGO_SECRET_KEY")"
            printf 'DJANGO_ALLOWED_HOSTS=%s\n' "$(env_value "$DJANGO_ALLOWED_HOSTS")"
            printf 'FRONTEND_ORIGIN=%s\n' "$(env_value "$FRONTEND_ORIGIN")"
            printf 'BACKEND_PORT=%s\n' "$(env_value "$BACKEND_PORT")"
            printf 'FRONTEND_PORT=%s\n' "$(env_value "$FRONTEND_PORT")"
            printf 'SEED_DEMO_DATA=%s\n' "$(env_value "$SEED_DEMO_DATA")"
          } > "$env_file"

          scp "$env_file" "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/.env"

          remote_dir="$(printf '%q' "$VPS_APP_DIR")"
          printf '%s\n' "$GHCR_TOKEN" | ssh "$VPS_USER@$VPS_HOST" "cd $remote_dir && docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          ssh "$VPS_USER@$VPS_HOST" "cd $remote_dir && docker compose pull"
          ssh "$VPS_USER@$VPS_HOST" "cd $remote_dir && docker compose up -d"
          ssh "$VPS_USER@$VPS_HOST" "docker image prune -f"
